version: '3.8'
services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: quant_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=your_strong_password
      - POSTGRES_DB=quant_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: