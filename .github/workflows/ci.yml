name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel previous runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-types:
    name: Lint + types (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (types)
        run: mypy

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      # Don't bail out of the whole matrix on the first failure — the
      # version-specific failure is more informative when we see all
      # versions at once.
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  # Real database smoke test. Spins up TimescaleDB, applies every
  # migration in order via memeco-migrate, and re-runs to confirm
  # idempotency. Catches SQL drift that fakes don't see.
  migrations-smoke:
    name: Migrations smoke (TimescaleDB)
    runs-on: ubuntu-latest
    services:
      db:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: ci_secret
          POSTGRES_DB: quant_intelligence
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d quant_intelligence"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://admin:ci_secret@localhost:5432/quant_intelligence
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Apply migrations (first run)
        run: memeco-migrate

      - name: Re-apply migrations (idempotency check)
        run: memeco-migrate

      - name: Dry-run shows no pending migrations
        run: |
          OUT=$(memeco-migrate --dry-run)
          echo "$OUT"
          echo "$OUT" | grep -q "All migrations are up to date."

  # Build the Vite SPA bundle and verify it produces the expected
  # entries. The FastAPI server prefers these built artefacts when
  # present, so a green build here means the migrated pages will
  # render in production.
  web-build:
    name: Web build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/pages/system/index.html
          test -f dist/pages/wallet/index.html
          test -f dist/pages/token/index.html
          test -f dist/pages/whale/index.html
          ls -1 dist/assets | grep -E '^system-.*\.js$'
          ls -1 dist/assets | grep -E '^wallet-.*\.(js|css)$'
          ls -1 dist/assets | grep -E '^token-.*\.(js|css)$'
          ls -1 dist/assets | grep -E '^whale-.*\.(js|css)$'
